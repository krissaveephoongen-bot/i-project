[build]
  command = "npm install --include=dev && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  NPM_VERBOSE = "true"
  NODE_ENV = "production"
  VITE_API_URL = "https://your-production-api-url.com"
  NPM_CONFIG_PRODUCTION = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.example.com https://your-production-api-url.com;"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[dev]
  publish = "dist"
  port = 5173
  targetPort = 5173
  framework = "vite"

[context.production]
  command = "npm install --include=dev && npm run build"
  publish = "dist"
  environment = { NODE_ENV = "production", NPM_CONFIG_PRODUCTION = "false" }

[context.deploy-preview]
  command = "npm install && npm run build"
  publish = "dist"
  environment = { NODE_ENV = "development" }

[context.branch-deploy]
  command = "npm install && npm run build"
  publish = "dist"
  environment = { NODE_ENV = "development" }

[context.next]
  command = "npm install && npm run build"
  publish = "dist"
  environment = { NODE_ENV = "development" }
