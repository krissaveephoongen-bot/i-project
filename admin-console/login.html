<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ระบบจัดการโครงการ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/0fde8e1e73.js" crossorigin="anonymous"></script>
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1F2937;
            margin: 0;
        }

        .logo p {
            color: #666;
            font-size: 13px;
            margin: 4px 0 0 0;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #1F2937;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #D1D5DB;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .alert-error {
            background: #FEE2E2;
            color: #991B1B;
            border-left: 4px solid #DC2626;
        }

        .alert-success {
            background: #DCFCE7;
            color: #166534;
            border-left: 4px solid #16A34A;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #666;
        }

        .remember-me input {
            cursor: pointer;
        }

        .forgot-password {
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
        }

        .forgot-password a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .demo-credentials {
            background: #F3F4F6;
            padding: 12px;
            border-radius: 6px;
            margin-top: 24px;
            font-size: 12px;
            color: #666;
        }

        .demo-credentials strong {
            color: #1F2937;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                <h1>Admin Console</h1>
                <p>ระบบจัดการโครงการ</p>
            </div>

            <div id="alert-container"></div>

            <!-- Login Method Tabs -->
            <div style="display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid #E5E7EB;">
                <button type="button" class="tab-btn active" data-tab="pin" onclick="switchTab('pin')" 
                    style="flex: 1; padding: 12px; background: none; border: none; border-bottom: 2px solid #667eea; color: #667eea; font-weight: 600; cursor: pointer; transition: all 0.2s;">
                    🔐 PIN
                </button>
                <button type="button" class="tab-btn" data-tab="email" onclick="switchTab('email')"
                    style="flex: 1; padding: 12px; background: none; border: none; border-bottom: 2px solid transparent; color: #999; font-weight: 600; cursor: pointer; transition: all 0.2s;">
                    📧 อีเมล
                </button>
            </div>

            <!-- PIN Login Form -->
            <form id="pin-form" style="display: block;">
                <div class="form-group">
                    <label for="pin">PIN (6 หลัก)</label>
                    <input
                        type="password"
                        id="pin"
                        class="form-control"
                        placeholder="••••••"
                        maxlength="6"
                        pattern="[0-9]{6}"
                        required
                    />
                </div>

                <button type="submit" class="btn-login" id="pin-btn">
                    <span>ยืนยัน PIN</span>
                </button>
            </form>

            <!-- Email Login Form -->
            <form id="login-form" style="display: none;">
                <div class="form-group">
                    <label for="email">อีเมล</label>
                    <input
                        type="email"
                        id="email"
                        class="form-control"
                        placeholder="admin@example.com"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="password">รหัสผ่าน</label>
                    <input
                        type="password"
                        id="password"
                        class="form-control"
                        placeholder="••••••••"
                        required
                    />
                </div>

                <label class="remember-me">
                    <input type="checkbox" id="remember" />
                    <span>จำฉันไว้</span>
                </label>

                <button type="submit" class="btn-login" id="login-btn">
                    <span>เข้าสู่ระบบ</span>
                </button>

                <div class="forgot-password">
                    <a href="#" onclick="handleForgotPassword(event)">
                        <i class="fas fa-redo"></i> ลืมรหัสผ่าน?
                    </a>
                </div>
            </form>

            <div class="demo-credentials">
                <strong>🧪 ข้อมูลสำหรับทดสอบ:</strong><br>
                อีเมล: admin@example.com<br>
                รหัสผ่าน: Admin@123
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';

        function showAlert(message, type = 'error') {
            const container = document.getElementById('alert-container');
            const alertEl = document.createElement('div');
            alertEl.className = `alert alert-${type}`;
            alertEl.innerHTML = `
                <i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i>
                <span>${message}</span>
            `;
            container.innerHTML = '';
            container.appendChild(alertEl);

            if (type === 'success') {
                setTimeout(() => {
                    window.location.href = '/admin/index.html';
                }, 1500);
            }
        }

        // Switch between PIN and Email login tabs
        function switchTab(tab) {
            const pinForm = document.getElementById('pin-form');
            const emailForm = document.getElementById('login-form');
            const tabBtns = document.querySelectorAll('.tab-btn');

            tabBtns.forEach(btn => {
                if (btn.dataset.tab === tab) {
                    btn.classList.add('active');
                    btn.style.borderBottomColor = '#667eea';
                    btn.style.color = '#667eea';
                } else {
                    btn.classList.remove('active');
                    btn.style.borderBottomColor = 'transparent';
                    btn.style.color = '#999';
                }
            });

            if (tab === 'pin') {
                pinForm.style.display = 'block';
                emailForm.style.display = 'none';
            } else {
                pinForm.style.display = 'none';
                emailForm.style.display = 'block';
            }
        }

        // PIN Verification Handler
        document.getElementById('pin-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const pin = document.getElementById('pin').value;
            const btn = document.getElementById('pin-btn');
            const btnText = btn.querySelector('span');
            const originalText = btnText.textContent;

            btn.disabled = true;
            btnText.innerHTML = '<span class="loading-spinner"></span>';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/pin-verify`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ pin })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Save token and user data
                    sessionStorage.setItem('token', data.token);
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    sessionStorage.setItem('isPINVerified', 'true');

                    showAlert('ยืนยัน PIN สำเร็จ!', 'success');
                } else {
                    showAlert(data.message || 'PIN ไม่ถูกต้อง', 'error');
                    btn.disabled = false;
                    btnText.textContent = originalText;
                    document.getElementById('pin').value = '';
                }
            } catch (error) {
                console.error('PIN verification error:', error);
                showAlert('เกิดข้อผิดพลาดในการยืนยัน PIN', 'error');
                btn.disabled = false;
                btnText.textContent = originalText;
            }
        });

        // Email/Password Login Handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember').checked;
            const btn = document.getElementById('login-btn');
            const btnText = btn.querySelector('span');
            const originalText = btnText.textContent;

            btn.disabled = true;
            btnText.innerHTML = '<span class="loading-spinner"></span>';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Save token and user data
                    const storage = rememberMe ? localStorage : sessionStorage;
                    storage.setItem('token', data.token);
                    storage.setItem('user', JSON.stringify(data.user));

                    // Check if user is admin
                    if (data.user.role !== 'admin') {
                        showAlert('คุณไม่มีสิทธิ์เข้าถึง Admin Console', 'error');
                        btn.disabled = false;
                        btnText.textContent = originalText;
                        return;
                    }

                    showAlert('เข้าสู่ระบบสำเร็จ!', 'success');
                } else {
                    showAlert(data.message || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง', 'error');
                    btn.disabled = false;
                    btnText.textContent = originalText;
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('เกิดข้อผิดพลาดในการเข้าสู่ระบบ', 'error');
                btn.disabled = false;
                btnText.textContent = originalText;
            }
        });

        function handleForgotPassword(e) {
            e.preventDefault();
            showAlert('โปรดติดต่อผู้ดูแลระบบเพื่อรีเซ็ตรหัสผ่าน', 'warning');
        }

        // Load saved email if remember me was checked
        window.addEventListener('load', () => {
            const savedEmail = localStorage.getItem('remembered_email');
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('remember').checked = true;
            }
        });

        // Save email when remember me is checked
        document.getElementById('remember').addEventListener('change', (e) => {
            if (e.target.checked) {
                localStorage.setItem('remembered_email', document.getElementById('email').value);
            } else {
                localStorage.removeItem('remembered_email');
            }
        });
    </script>
</body>
</html>
