version: '3.8'

services:
  # Frontend Application
  frontend:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: project-mgnt-frontend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - VITE_API_URL=http://localhost:5000
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - app-network

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: development
    container_name: project-mgnt-api
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app/server
      - /app/node_modules
    working_dir: /app
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/project_mgnt?schema=public
      - JWT_SECRET=your_jwt_secret_key_here
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network
    command: sh -c "cd server && npm install && npm run dev"

  # Database
  db:
    image: postgres:16-alpine
    container_name: project-mgnt-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=project_mgnt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Optional: PGAdmin for database management
  pgadmin:
    image: dpage/pgadmin4
    container_name: project-mgnt-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - app-network

  # Redis for caching (optional)
  # redis:
  #   image: redis:alpine
  #   container_name: project-mgnt-redis
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
