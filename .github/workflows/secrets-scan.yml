name: 🔐 Secrets Detection

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop, staging ]

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    name: Detect Secrets in Code

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Run npm security check
        run: npm run scan:secrets 2>/dev/null || echo "Security scanner not configured yet"

  lint-staged:
    runs-on: ubuntu-latest
    name: Check Staged Files for Secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install husky
        run: npx husky install

      - name: Check for hardcoded secrets
        run: |
          echo "🔐 Checking for secrets in files..."
          
          # Search for common secret patterns
          if grep -r --include="*.js" --include="*.ts" --include="*.tsx" --include="*.json" \
            -E "password\s*[:=]|secret\s*[:=]|api[_-]?key\s*[:=]|token\s*[:=]" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=dist \
            --exclude=".env.example" . 2>/dev/null; then
            
            echo "⚠️  Potential secrets found!"
            echo "Please review the above findings."
            echo ""
            echo "Guidelines:"
            echo "- Use environment variables instead of hardcoded values"
            echo "- For test credentials, use process.env.TEST_USER_PASSWORD"
            echo "- Never commit actual credentials to version control"
            echo ""
            exit 1
          else
            echo "✅ No obvious secrets detected"
            exit 0
          fi

  secret-scanning-config:
    runs-on: ubuntu-latest
    name: Verify Secret Scanning is Enabled
    
    steps:
      - name: Check GitHub Secret Scanning
        run: |
          echo "📋 Secret scanning status check"
          echo "To enable GitHub's built-in secret scanning:"
          echo "1. Go to Settings → Code security & analysis"
          echo "2. Enable 'Secret scanning'"
          echo "3. Enable 'Push protection'"
          echo ""
          echo "This will automatically detect and block commits with secrets."
