# Fly.io Configuration for Express Backend
app = "ticket-apw-api"
primary_region = "sjc"

[build]
  builder = "heroku"

[env]
  NODE_ENV = "production"

[[services]]
  protocol = "tcp"
  internal_port = 3001
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[checks]
  [checks.http]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    path = "/api/health"
    protocol = "http"
    timeout = "5s"
    tls_skip_verify = false
